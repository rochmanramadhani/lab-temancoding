version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      prod-deps:
        dependency-type: production
      dev-deps:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      # Stay on Node LTS — skip non-LTS majors (odd numbers + bleeding-edge).
      # Adjust this list when a new even-numbered LTS lands.
      - dependency-name: "node"
        versions: ["23", "25", "26", "27"]
