services:
  app:
    image: ghcr.io/rochmanramadhani/lab-temancoding:latest
    container_name: lab-app
    restart: unless-stopped
    pull_policy: always
    expose:
      - "3000"
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: lab-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - app
# Auto-deploy is handled by a systemd timer on the host — see deploy/.
